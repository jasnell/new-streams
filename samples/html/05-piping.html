<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>05 - Piping</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --primary: #0f3460;
      --accent: #e94560;
      --text: #eaeaea;
      --text-muted: #a0a0a0;
      --code-bg: #0d1b2a;
      --success: #4ecca3;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 2rem;
      line-height: 1.6;
    }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { color: var(--accent); margin-bottom: 0.5rem; }
    .subtitle { color: var(--text-muted); margin-bottom: 2rem; }
    a { color: var(--accent); }
    .output {
      background: var(--code-bg);
      border-radius: 8px;
      padding: 1.5rem;
      font-family: 'SF Mono', Monaco, 'Courier New', monospace;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-wrap: break-word;
      min-height: 400px;
      overflow: auto;
    }
    .section { color: var(--accent); font-weight: bold; }
    .success { color: var(--success); }
    .error { color: #ff6b6b; }
    .nav { margin-bottom: 1rem; }
    .nav a { margin-right: 1rem; }
    .run-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    .run-btn:hover { opacity: 0.9; }
    .run-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="container">
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="04-push-streams.html">Prev: Push Streams</a>
      <a href="06-branching.html">Next: Branching</a>
    </nav>
    
    <h1>05 - Piping</h1>
    <p class="subtitle">Pipe streams through transforms to writer destinations with pipeTo()</p>
    
    <button id="runBtn" class="run-btn">Run Again</button>
    <div id="output" class="output">Running examples...</div>
  </div>

  <script type="module">
    import { Stream } from '/dist/index.js';
    
    const output = document.getElementById('output');
    output.textContent = '';
    
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    
    function log(msg) {
      output.textContent += msg + '\n';
    }
    
    function section(title) {
      log(`\n<span class="section">═══ ${title} ═══</span>\n`);
    }
    
    function success(msg) {
      log(`<span class="success">✓ ${msg}</span>`);
    }
    
    function render() {
      output.innerHTML = output.textContent;
    }
    
    // Simple in-memory writer for demos
    class MemoryWriter {
      constructor() {
        this.chunks = [];
        this._closed = false;
        this._byteCount = 0;
      }
      
      get desiredSize() {
        return this._closed ? null : 100;
      }
      
      async write(chunk) {
        if (this._closed) throw new Error('Writer is closed');
        const bytes = typeof chunk === 'string' ? enc.encode(chunk) : chunk;
        this.chunks.push(bytes);
        this._byteCount += bytes.byteLength;
      }
      
      async writev(chunks) {
        for (const chunk of chunks) {
          await this.write(chunk);
        }
      }
      
      async end() {
        this._closed = true;
        return this._byteCount;
      }
      
      async fail(reason) {
        this._closed = true;
      }

      writeSync(chunk) { return false; }
      writevSync(chunks) { return false; }
      endSync() { return -1; }
      failSync(reason) { return false; }
      
      getText() {
        return this.chunks.map(c => dec.decode(c, { stream: true })).join('') + dec.decode();
      }
    }
    
    // Uppercase transform
    function uppercaseTransform() {
      return function* (chunks) {
        if (chunks === null) return enc.encode(dec.decode());
        for (const chunk of chunks) {
          yield enc.encode(dec.decode(chunk, { stream: true }).toUpperCase());
        }
      };
    }
    
    async function main() {
      try {
        // ============================================================
        // Basic pipeTo - source to writer
        // ============================================================
        section('Basic Stream.pipeTo()');
        
        {
          const source = Stream.from(['Hello', ' ', 'World', '!']);
          const writer = new MemoryWriter();
          
          const bytesWritten = await Stream.pipeTo(source, writer);
          
          log(`Bytes written: ${bytesWritten}`);
          log(`Result: "${writer.getText()}"`);
          success('Basic pipeTo works');
        }
        
        // ============================================================
        // pipeTo with transforms
        // ============================================================
        section('pipeTo with transforms');
        
        {
          function* addBrackets(chunks) {
            if (chunks === null) return;
            for (const chunk of chunks) {
              yield enc.encode(`[${dec.decode(chunk)}]`);
            }
          }
          
          const source = Stream.from(['hello', ' ', 'world']);
          const writer = new MemoryWriter();
          
          // Transform chain: uppercase -> addBrackets -> writer
          const bytesWritten = await Stream.pipeTo(
            source,
            uppercaseTransform(),
            addBrackets,
            writer
          );
          
          log(`Bytes written: ${bytesWritten}`);
          log(`Transformed result: "${writer.getText()}"`);
          success('pipeTo with transforms works');
        }
        
        // ============================================================
        // pipeTo options
        // ============================================================
        section('pipeTo options');
        
        // preventClose - don't close writer on completion
        {
          const writer = new MemoryWriter();
          
          // First write
          await Stream.pipeTo(
            Stream.from('First '),
            writer,
            { preventClose: true }
          );
          
          // Second write to same writer
          await Stream.pipeTo(
            Stream.from('Second'),
            writer,
            { preventClose: true }
          );
          
          // Manually close
          await writer.end();
          
          log(`Combined result: "${writer.getText()}"`);
          success('preventClose option works');
        }
        
        // ============================================================
        // Piping to push stream writer
        // ============================================================
        section('Piping to push stream writer');
        
        {
          // Create a push stream to receive piped data
          const { writer: pushWriter, readable: pushReadable } = Stream.push();
          
          // Pipe in background
          const pipePromise = Stream.pipeTo(
            Stream.from(['piped', ' ', 'data']),
            uppercaseTransform(),
            pushWriter
          );
          
          // Read from the push stream
          const text = await Stream.text(pushReadable);
          await pipePromise;
          
          log(`Piped through push stream: "${text}"`);
          success('Piping to push writer works');
        }
        
        // ============================================================
        // Chained transforms with pipeTo
        // ============================================================
        section('Chained transforms');
        
        {
          // Transform 1: Add prefix
          function* addPrefix(chunks) {
            if (chunks === null) return;
            for (const chunk of chunks) {
              yield enc.encode('>> ' + dec.decode(chunk));
            }
          }
          
          // Transform 2: Add suffix
          function* addSuffix(chunks) {
            if (chunks === null) return;
            for (const chunk of chunks) {
              yield enc.encode(dec.decode(chunk) + ' <<');
            }
          }
          
          const writer = new MemoryWriter();
          
          await Stream.pipeTo(
            Stream.from(['line1\n', 'line2\n', 'line3']),
            addPrefix,
            addSuffix,
            writer
          );
          
          log(`Chained transforms:\n${writer.getText()}`);
          success('Chained transforms work');
        }
        
        // ============================================================
        // Error handling in pipelines
        // ============================================================
        section('Error handling in pipelines');
        
        {
          // Transform that throws on specific input
          function* failOnBad(chunks) {
            if (chunks === null) return;
            for (const chunk of chunks) {
              const text = dec.decode(chunk);
              if (text.includes('bad')) {
                throw new Error('Found bad data!');
              }
              yield chunk;
            }
          }
          
          const writer = new MemoryWriter();
          
          try {
            await Stream.pipeTo(
              Stream.from(['good', 'bad', 'ugly']),
              failOnBad,
              writer
            );
          } catch (err) {
            log(`Pipeline error caught: "${err.message}"`);
            log(`Partial data written: "${writer.getText()}"`);
            success('Error handling works');
          }
        }
        
        // ============================================================
        // Real-world: Processing pipeline
        // ============================================================
        section('Real-world: Processing pipeline');
        
        {
          // Simulate a data processing pipeline
          
          // Parse "CSV" lines
          function* parseLines(chunks) {
            if (chunks === null) return;
            for (const chunk of chunks) {
              const text = dec.decode(chunk);
              for (const line of text.split('\n')) {
                if (line.trim()) {
                  yield enc.encode(line + '\n');
                }
              }
            }
          }
          
          // Format as JSON
          function* toJson(chunks) {
            if (chunks === null) return;
            for (const chunk of chunks) {
              const line = dec.decode(chunk).trim();
              const [name, value] = line.split(',');
              yield enc.encode(JSON.stringify({ name, value }) + '\n');
            }
          }
          
          const csvData = 'Alice,100\nBob,200\nCharlie,300';
          const writer = new MemoryWriter();
          
          await Stream.pipeTo(
            Stream.from(csvData),
            parseLines,
            toJson,
            writer
          );
          
          log(`Processed output:\n${writer.getText()}`);
          success('Processing pipeline works');
        }
        
        // ============================================================
        section('All examples completed successfully!');
        
      } catch (err) {
        log(`\n<span class="error">Error: ${err.message}</span>`);
        console.error(err);
      }
      
      render();
    }
    
    main();
    
    document.getElementById('runBtn').addEventListener('click', () => {
      output.textContent = 'Running examples...\n';
      main();
    });
  </script>
</body>
</html>

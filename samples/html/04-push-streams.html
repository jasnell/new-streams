<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>04 - Push-Based Streams</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --primary: #0f3460;
      --accent: #e94560;
      --text: #eaeaea;
      --text-muted: #a0a0a0;
      --code-bg: #0d1b2a;
      --success: #4ecca3;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 2rem;
      line-height: 1.6;
    }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { color: var(--accent); margin-bottom: 0.5rem; }
    .subtitle { color: var(--text-muted); margin-bottom: 2rem; }
    a { color: var(--accent); }
    .output {
      background: var(--code-bg);
      border-radius: 8px;
      padding: 1.5rem;
      font-family: 'SF Mono', Monaco, 'Courier New', monospace;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-wrap: break-word;
      min-height: 400px;
      overflow: auto;
    }
    .section { color: var(--accent); font-weight: bold; }
    .success { color: var(--success); }
    .error { color: #ff6b6b; }
    .nav { margin-bottom: 1rem; }
    .nav a { margin-right: 1rem; }
    .run-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    .run-btn:hover { opacity: 0.9; }
    .run-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="container">
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="03-transforms.html">Prev: Transforms</a>
      <a href="05-piping.html">Next: Piping</a>
    </nav>

    <h1>04 - Push-Based Streams</h1>
    <p class="subtitle">Create producer-driven streams with Stream.push() and writers</p>

    <button id="runBtn" class="run-btn">Run Again</button>
    <div id="output" class="output">Running examples...</div>
  </div>

  <script type="module">
    import { Stream } from '/dist/index.js';

    const output = document.getElementById('output');
    output.textContent = '';

    function log(msg) {
      output.textContent += msg + '\n';
    }

    function section(title) {
      log(`\n<span class="section">═══ ${title} ═══</span>\n`);
    }

    function success(msg) {
      log(`<span class="success">✓ ${msg}</span>`);
    }

    function render() {
      output.innerHTML = output.textContent;
    }

    async function main() {
      try {
        // ============================================================
        // Basic Stream.push() usage
        // ============================================================
        section('Basic Stream.push()');

        {
          // Create a push stream - returns writer and readable
          const { writer, readable } = Stream.push();

          // Producer: write data asynchronously
          (async () => {
            await writer.write('Hello');
            await writer.write(' ');
            await writer.write('World');
            await writer.end();
          })();

          // Consumer: read all data
          const text = await Stream.text(readable);
          log(`Result: "${text}"`);
          success('Basic push stream works');
        }

        // ============================================================
        // Writer methods
        // ============================================================
        section('Writer methods');

        // write() - single chunk
        {
          const { writer, readable } = Stream.push();

          (async () => {
            // write() accepts string or Uint8Array
            await writer.write('string chunk');
            await writer.write(new Uint8Array([32, 33])); // " !"
            await writer.end();
          })();

          const text = await Stream.text(readable);
          log(`write() result: "${text}"`);
          success('write() works');
        }

        // writev() - multiple chunks at once
        {
          const { writer, readable } = Stream.push();

          (async () => {
            await writer.writev(['chunk1', ' ', 'chunk2']);
            await writer.end();
          })();

          const text = await Stream.text(readable);
          log(`writev() result: "${text}"`);
          success('writev() works');
        }

        // desiredSize - backpressure indicator
        {
          const { writer, readable } = Stream.push();

          log(`Initial desiredSize: ${writer.desiredSize}`);

          // Start consuming in background
          const readPromise = Stream.text(readable);

          await writer.write('data');
          log(`After write desiredSize: ${writer.desiredSize}`);

          await writer.end();
          await readPromise;

          log(`After end desiredSize: ${writer.desiredSize}`);
          success('desiredSize works');
        }

        // ============================================================
        // Backpressure handling
        // ============================================================
        section('Backpressure handling');

        {
          // Create stream with small buffer
          const { writer, readable } = Stream.push({
            highWaterMark: 10  // Small buffer
          });

          let writeCount = 0;

          // Start consuming slowly
          const consumerPromise = (async () => {
            const chunks = [];
            for await (const batch of readable) {
              // Simulate slow consumer
              await new Promise(r => setTimeout(r, 5));
              for (const chunk of batch) {
                chunks.push(new TextDecoder().decode(chunk));
              }
            }
            return chunks.join('');
          })();

          // Producer writes quickly
          for (let i = 0; i < 5; i++) {
            await writer.write(`msg${i}`);
            writeCount++;
          }
          await writer.end();

          const result = await consumerPromise;
          log(`Wrote ${writeCount} messages`);
          log(`Result: "${result}"`);
          success('Backpressure works');
        }

        // ============================================================
        // Error handling with fail()
        // ============================================================
        section('Error handling with fail()');

        {
          const { writer, readable } = Stream.push();

          // Producer encounters an error
          (async () => {
            await writer.write('partial data');
            await writer.fail(new Error('Producer failed'));
          })();

          // Consumer sees the error
          try {
            await Stream.text(readable);
          } catch (err) {
            log(`Consumer caught error: "${err.message}"`);
            success('fail() propagates errors');
          }
        }

        // ============================================================
        // Real-world pattern: Event source
        // ============================================================
        section('Real-world pattern: Event source');

        {
          // Simulate an event emitter pushing to a stream
          const { writer, readable } = Stream.push();

          // Simulate events
          const events = ['event1', 'event2', 'event3'];
          let eventIndex = 0;

          const intervalId = setInterval(async () => {
            if (eventIndex < events.length) {
              await writer.write(events[eventIndex] + '\n');
              eventIndex++;
            } else {
              clearInterval(intervalId);
              await writer.end();
            }
          }, 20);

          // Consume events
          const text = await Stream.text(readable);
          log(`Events received:\n${text}`);
          success('Event source pattern works');
        }

        // ============================================================
        // Concurrent producers (wrapping async sources)
        // ============================================================
        section('Wrapping async sources');

        {
          // Wrap a timer-based source
          function createTimerStream(count, intervalMs) {
            const { writer, readable } = Stream.push();

            let i = 0;
            const timer = setInterval(async () => {
              if (i < count) {
                await writer.write(`tick ${i}\n`);
                i++;
              } else {
                clearInterval(timer);
                await writer.end();
              }
            }, intervalMs);

            return readable;
          }

          const timerStream = createTimerStream(3, 15);
          const text = await Stream.text(timerStream);
          log(`Timer output:\n${text}`);
          success('Async source wrapping works');
        }

        // ============================================================
        section('All examples completed successfully!');

      } catch (err) {
        log(`\n<span class="error">Error: ${err.message}</span>`);
        console.error(err);
      }

      render();
    }

    main();

    document.getElementById('runBtn').addEventListener('click', () => {
      output.textContent = 'Running examples...\n';
      main();
    });
  </script>
</body>
</html>
